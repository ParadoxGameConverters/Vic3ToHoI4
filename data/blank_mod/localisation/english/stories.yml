l_english:
 negotiate_with_italian_nations:0 "Negotiate with [THIS.GetNameDef]"
 negotiate_with_italian_nations_desc:0 "Try to convince [THIS.GetNameDef] to join our nation."
 negotiate_with_non_italian_nations:0 "Negotiate with [THIS.GetNameDef]"
 negotiate_with_non_italian_nations_desc:0 "Try to convince [THIS.GetNameDef] to return Italian lands to us."
 unification_italy.10.t:0 "[FROM.GetNameDef] Requests Union"
 unification_italy.10.d:0 "[FROM.GetNameDef] is trying to unite the Italian homelands. They are requesting we be united with them under their leadership. Should we acquiesce?"
 unification_italy.10.a:0 "Yes"
 unification_italy.10.b:0 "No"
 unification_italy.11.t:0 "[FROM.GetNameDef] Agrees To Union"
 unification_italy.11.d:0 "[FROM.GetNameDef] agrees to be united with us under our leadership."
 unification_italy.11.a:0 "Good"
 unification_italy.12.t:0 "[FROM.GetNameDef] Refuses Union"
 unification_italy.12.d:0 "[FROM.GetNameDef] refuses to be united with us under our leadership."
 unification_italy.12.a:0 "We Could Force Them"
 unification_italy.20.t:0 "[FROM.GetNameDef] Demands Lands"
 unification_italy.20.d:0 "[FROM.GetNameDef] demands that Italian homelands be turned over to them. Should we acquiesce?"
 unification_italy.20.a:0 "Yes"
 unification_italy.20.b:0 "No"
 unification_italy.21.t:0 "[FROM.GetNameDef] Returns Lands"
 unification_italy.21.d:0 "[FROM.GetNameDef] agrees to hand over Italian homelands to our control."
 unification_italy.21.a:0 "Good"
 unification_italy.22.t:0 "[FROM.GetNameDef] Keeps Lands"
 unification_italy.22.d:0 "[FROM.GetNameDef] refuses to hand over Italian homelands to our control."
 unification_italy.22.a:0 "We Could Force Them"